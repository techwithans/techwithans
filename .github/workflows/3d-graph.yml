name: GitHub-Profile-3D-Contrib

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: techwithans

      - run: |
          git config user.email "ansrajpoot79@gmail.com"
          git config user.name "techwithans"
          git add -A
          git diff --staged --quiet || git commit -m "3d-contrib"
          git push
